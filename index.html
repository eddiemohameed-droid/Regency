<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regency Unit Finder</title>

<style>
body{
    font-family:Arial;
    background:#f3f3f3;
    margin:0;
}

.container{
    width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#003B73;
}

select{
    width:100%;
    padding:12px;
    margin:20px 0;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
}

.available{
    color:green;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Regency Unit Finder</h1>

<select>
<option>Select Unit</option>
<option>A101</option>
<option>A102</option>
<option>B201</option>
</select>

<div class="card">

<h2>Unit A101</h2>

<p><b>Area:</b> 52 SQM</p>

<p><b>Price:</b> 3,250,000 EGP</p>

<p><b>Payment Plan:</b> 10% Down Payment - 8 Years</p>

<p class="available">Available</p>

</div>

</div>

</body>
</html>
