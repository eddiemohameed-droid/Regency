<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Regency Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav class="navbar">

<div class="container">

<h2>🏢 Regency Inventory</h2>

<span class="badge">
Sales Dashboard
</span>

</div>

</nav>



<div class="container py-4">


<div class="hero">

<h1>Property Inventory System</h1>

<p>Find Units, Calculate Payments & Reserve Instantly</p>

</div>





<div class="card p-4 mt-4">

<h3>Search Property</h3>


<div class="row">


<div class="col-md-4">

<label>Project</label>

<select id="projectSelect" class="form-select">

<option>Regency Tower II</option>

</select>


</div>




<div class="col-md-4">

<label>Area</label>

<select id="areaSelect" class="form-select">

<option>Select Area</option>

</select>


</div>




<div class="col-md-4">

<label>Floor</label>

<select id="floorSelect" class="form-select">

<option>Select Floor</option>

</select>


</div>



</div>

</div>







<div id="detailsSection" class="card p-4 mt-4" style="display:none">


<div class="row">


<div class="col-md-6">


<img id="unitImage">


<div id="gallery" class="mt-3"></div>


</div>




<div class="col-md-6">


<h2 id="unitName"></h2>


<p>
Area:
<b id="area"></b>
</p>


<p>
Price:
<b id="price"></b>
</p>


<p>
Status:
<b id="status"></b>
</p>


<p>
Payment Plan:
<b id="payment"></b>
</p>



<button id="calculateBtn" class="btn btn-primary">

Calculate Payment

</button>



<button id="bookBtn" class="btn btn-warning">

Book Now

</button>



<div id="bookingBox" class="mt-4" style="display:none">


<h4>Reservation</h4>


<select id="salesSelect" class="form-select mb-2">

<option>Select Sales</option>

<option>Mohamed Abdelhamid</option>

<option>Ahmed Awad</option>

<option>Menas Nagy</option>

</select>



<select id="paymentMethod" class="form-select mb-2">

<option>Select Payment</option>

<option>Visa</option>

<option>Cash</option>

</select>



<button id="confirmBooking" class="btn btn-success">

Confirm

</button>



<p id="bookingResult"></p>


</div>



</div>


</div>


</div>








<div class="card p-4 mt-4">

<h3>Payment Calculator</h3>


<input id="downPayment"

class="form-control"

placeholder="Down Payment">


<select id="paymentType" class="form-select mt-3">

<option value="12">Monthly</option>

<option value="4">Quarterly</option>

<option value="1">Yearly</option>


</select>



<h4 id="calculatorResult" class="mt-3"></h4>


</div>






<div class="card p-4 mt-4">


<h3>Project Highlights</h3>


<p>
Company Location:
<span id="companyLocation"></span>
</p>


<p>
Project Location:
<span id="projectLocation"></span>
</p>


<ul id="landmarks"></ul>


<ul id="amenities"></ul>


</div>



</div>



<script src="script.js"></script>

</body>

</html>
