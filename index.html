<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Regency Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold fs-3">

🏢 Regency Inventory

</a>

<span class="text-light">

Smart Sales Tool

</span>

</div>

</nav>



<div class="container mt-4">

<div class="hero">

<div>

<h1>Property Finder</h1>

<p>

Search Any Property In Seconds

</p>

</div>

<div>

<span class="badge bg-success fs-6">

System Online

</span>

</div>

</div>



<div class="row mt-4 g-4">

<!-- LEFT -->

<div class="col-lg-4">

<div class="card p-4 h-100 shadow-lg border-0">

<h3 class="mb-4">

<i class="bi bi-search"></i>

Search Property

</h3>



<label>

Project

</label>

<select id="projectSelect" class="form-select mb-3">

<option>

Regency Tower II

</option>

</select>



<label>

Floor

</label>

<select id="floorSelect" class="form-select mb-3">

<option>

Select Floor

</option>

</select>



<label>

Area

</label>

<select id="areaSelect" class="form-select">

<option>

Select Area

</option>

</select>

</div>

</div>



<!-- RIGHT -->

<div class="col-lg-8">

<div class="card shadow-lg border-0 p-4">

<img

id="unitImage"

class="img-fluid rounded mb-4">



<h2 id="unitName">

Select Area

</h2>



<div class="row mt-3">

<div class="col-md-6 mb-3">

<div class="info-box">

<i class="bi bi-rulers"></i>

<h6>Area</h6>

<p id="area"></p>

</div>

</div>



<div class="col-md-6 mb-3">

<div class="info-box">

<i class="bi bi-cash-stack"></i>

<h6>Price</h6>

<p id="price"></p>

</div>

</div>



<div class="col-md-6 mb-3">

<div class="info-box">

<i class="bi bi-check-circle"></i>

<h6>Status</h6>

<p id="status"></p>

</div>

</div>



<div class="col-md-6 mb-3">

<div class="info-box">

<i class="bi bi-credit-card"></i>

<h6>Payment Plan</h6>

<p id="payment"></p>

</div>

</div>

</div>

</div>

</div>

</div>



<div class="card shadow-lg border-0 mt-4 p-4">

<h2>

<i class="bi bi-calculator"></i>

Payment Calculator

</h2>



<div class="row mt-3">

<div class="col-md-4">

<label>

Down Payment

</label>

<input

id="downPayment"

type="number"

class="form-control"

placeholder="500000">

</div>



<div class="col-md-4">

<label>

Years

</label>

<select

id="years"

class="form-select">

<option>8</option>

<option>10</option>

<option>12</option>

</select>

</div>



<div class="col-md-4">

<label>

Payment Type

</label>

<select

id="paymentType"

class="form-select">

<option value="12">

Monthly

</option>

<option value="4">

Quarterly

</option>

<option value="1">

Yearly

</option>

</select>

</div>

</div>



<button

id="calculateBtn"

class="btn btn-primary w-100 mt-4">

<i class="bi bi-calculator"></i>

Calculate Installment

</button>



<div

id="result"

class="result-box mt-4">

Select Area First

</div>

</div>

</div>



<script src="script.js"></script>

</body>

</html>
