<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Regency Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">

<div class="container">

<span class="navbar-brand mb-0 h1">

🏢 Regency Inventory System

</span>

</div>

</nav>


<div class="container py-4">

<div class="row">

<div class="col-lg-4">

<div class="card shadow-sm p-3">

<h4 class="mb-3">Search Unit</h4>

<div class="mb-3">

<label class="form-label">

Project

</label>

<select class="form-select" id="projectSelect">

<option>Regency Tower II</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Floor

</label>

<select class="form-select" id="floorSelect">

<option>Select Floor</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Area

</label>

<select class="form-select" id="areaSelect">

<option>Select Area</option>

</select>

</div>

</div>

</div>


<div class="col-lg-8">

<div class="card shadow-sm p-3">

<img id="unitImage" class="img-fluid rounded mb-3">

<h3 id="unitName">

Select Area

</h3>

<hr>

<p><b>Area:</b> <span id="area"></span></p>

<p><b>Price:</b> <span id="price"></span></p>

<p><b>Status:</b> <span id="status"></span></p>

<p><b>Payment Plan:</b> <span id="payment"></span></p>

</div>

</div>

</div>


<div class="card shadow-sm p-4 mt-4">

<h3>

Payment Calculator

</h3>

<div class="row">

<div class="col-md-4">

<label>

Down Payment

</label>

<input
type="number"
id="downPayment"
class="form-control">

</div>

<div class="col-md-4">

<label>

Payment Type

</label>

<select
id="paymentType"
class="form-select">

<option value="12">

Monthly</option>

<option value="4">

Quarterly</option>

<option value="1">

Yearly</option>

</select>

</div>

<div class="col-md-4">

<label>

Years

</label>

<select
id="years"
class="form-select">

<option>8</option>

<option>10</option>

<option>12</option>

</select>

</div>

</div>

<button
class="btn btn-primary mt-4 w-100"
id="calculateBtn">

Calculate

</button>

<div class="mt-4">

<h4 id="result">

</h4>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
