<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Regency Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<h2>🏢 Regency Inventory System</h2>

<div>
<button class="btn btn-light">Sales Mode</button>
<button class="btn btn-warning">Admin Mode</button>
</div>

</div>
</nav>


<div class="container mt-4">


<div class="hero">

<h1>Smart Property Finder</h1>

<p>Real Estate Sales Platform</p>

</div>



<div class="card p-4 mt-4">

<h3>Search Unit</h3>

<div class="row">


<div class="col-md-3">

<label>Floor</label>

<select id="floorSelect" class="form-select">

<option>Select Floor</option>

</select>

</div>



<div class="col-md-3">

<label>Area</label>

<select id="areaSelect" class="form-select">

<option>Select Area</option>

</select>

</div>



<div class="col-md-3">

<label>Down Payment</label>

<select id="dpSelect" class="form-select">

<option>0%</option>
<option>10%</option>
<option>20%</option>
<option>30%</option>

</select>

</div>



<div class="col-md-3">

<label>Years</label>

<select id="yearSelect" class="form-select">

<option>6 Years</option>
<option>8 Years</option>
<option>10 Years</option>
<option>11 Years</option>
<option>12.5 Years</option>

</select>

</div>


</div>

</div>





<div class="card p-4 mt-4">

<div class="row">


<div class="col-md-6">


<img id="unitImage" class="img-fluid rounded">


<div id="gallery" class="mt-3"></div>


</div>



<div class="col-md-6">


<h2 id="unitName">Select Unit</h2>


<p>Area:
<b id="area"></b>
</p>


<p>Price:
<b id="price"></b>
</p>


<p>Status:
<b id="status"></b>
</p>


<p>Payment:
<b id="payment"></b>
</p>


<button id="compareBtn" class="btn btn-success">

Add Compare

</button>


<button id="bookBtn" class="btn btn-primary">

Book Now

</button>


</div>


</div>

</div>





<div class="card p-4 mt-4">

<h3>Compare Units</h3>

<div id="compareBox">

No Units

</div>

</div>





<div class="card p-4 mt-4">

<h3>Payment Calculator</h3>


<input id="downPayment"
class="form-control"
placeholder="Down Payment">


<select id="paymentType" class="form-select mt-3">

<option value="12">Monthly</option>

<option value="4">Quarterly</option>

<option value="1">Yearly</option>

</select>


<button id="calculateBtn" class="btn btn-dark mt-3 w-100">

Calculate

</button>


<h3 id="result" class="mt-3"></h3>


</div>





<div class="card p-4 mt-4">


<h3>Booking</h3>


<select id="bookingMethod" class="form-select">

<option>Visa</option>

<option>Cash</option>

</select>


<p id="cashMessage"></p>



<select id="salesSelect" class="form-select">

<option>Select Sales</option>

<option>Ahmed Mohamed</option>

<option>Sara Ali</option>

<option>Mahmoud Hassan</option>

</select>


</div>





<div class="card p-4 mt-4">


<h3>Project Information</h3>


<p>
Company Location:
<span id="companyLocation"></span>
</p>


<p>
Project Location:
<span id="projectLocation"></span>
</p>


<h5>Nearby</h5>

<ul id="landmarks"></ul>


<h5>Amenities</h5>

<ul id="amenities"></ul>


</div>




</div>


<script src="script.js"></script>

</body>
</html>
