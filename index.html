<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regency Unit Finder</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
    margin:0;
}


.container{
    width:700px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}


h1{
    text-align:center;
    color:#003B73;
}


select,
input{

    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;

}


button{

    width:100%;
    padding:12px;
    background:#003B73;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;

}


.card{

    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    margin-top:20px;

}


.available{

    color:green;
    font-weight:bold;

}


.sold{

    color:red;
    font-weight:bold;

}


img{

    width:100%;
    margin-top:20px;
    border-radius:10px;

}


</style>


</head>


<body>


<div class="container">


<h1>
Regency Unit Finder
</h1>



<select id="floorSelect">

<option>Select Floor</option>

</select>



<select id="unitSelect">

<option>Select Unit</option>

</select>





<div class="card">


<h2 id="unitName">
Select a Unit
</h2>


<p>
<b>Area:</b>
<span id="area"></span>
</p>



<p>
<b>Price:</b>
<span id="price"></span>
</p>



<p>
<b>Payment Plan:</b>
<span id="payment"></span>
</p>



<p id="status"></p>



<img id="unitImage">



<hr>



<h2>
Payment Calculator
</h2>


<label>
Down Payment
</label>

<input 
type="number" 
id="downPayment"
placeholder="Enter Down Payment">



<label>
Installment Years
</label>


<input 
type="number" 
id="years"
placeholder="Enter Years">



<button onclick="calculatePayment()">

Calculate

</button>



<h3 id="result"></h3>



</div>


</div>





<script>


let currentPrice = 0;



fetch("units.json")


.then(response => response.json())


.then(data => {



let floorSelect =
document.getElementById("floorSelect");


let unitSelect =
document.getElementById("unitSelect");




// Load Floors


data.forEach(floor => {


let option =
document.createElement("option");


option.value =
floor.floor;


option.textContent =
floor.floor;


floorSelect.appendChild(option);


});





// Select Floor


floorSelect.addEventListener("change",function(){


unitSelect.innerHTML =
"<option>Select Unit</option>";



let selectedFloor =
data.find(
f => f.floor === this.value
);



selectedFloor.units.forEach(unit=>{


let option =
document.createElement("option");


option.value =
unit.unit;


option.textContent =
unit.unit;


unitSelect.appendChild(option);


});


});







// Select Unit


unitSelect.addEventListener("change",function(){



let selectedFloor =
data.find(
f=>f.floor === floorSelect.value
);



let selectedUnit =
selectedFloor.units.find(
u=>u.unit === this.value
);




currentPrice =
selectedUnit.price;



document.getElementById("unitName").innerHTML =
"Unit " + selectedUnit.unit;



document.getElementById("area").innerHTML =
selectedUnit.area;



document.getElementById("price").innerHTML =
selectedUnit.price.toLocaleString()
+
" EGP";



document.getElementById("payment").innerHTML =
selectedUnit.payment;



let status =
document.getElementById("status");


status.innerHTML =
selectedUnit.status;



status.className =
selectedUnit.status === "Available"
?
"available"
:
"sold";



document.getElementById("unitImage").src =
selectedUnit.image;



});



})

.catch(error=>console.log(error));







function calculatePayment(){



let downPayment =
Number(
document.getElementById("downPayment").value
);



let years =
Number(
document.getElementById("years").value
);



let remaining =
currentPrice - downPayment;



let monthly =
remaining / (years * 12);



document.getElementById("result").innerHTML =

"Monthly Installment: "
+
Math.round(monthly).toLocaleString()
+
" EGP";



}



</script>


</body>

</html>
