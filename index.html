<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Regency Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav class="navbar navbar-dark">

<div class="container">

<span class="navbar-brand fw-bold fs-3">

🏢 Regency Inventory

</span>


<div>

<button class="btn btn-light me-2">

Sales Mode

</button>


<button class="btn btn-warning">

Admin Mode

</button>

</div>


</div>

</nav>



<div class="container py-4">


<div class="hero">

<h1>

Smart Property Finder

</h1>

<p>

Complete Real Estate Sales System

</p>

</div>




<!-- SEARCH -->

<div class="card shadow p-4 mt-4">


<h3>

🔍 Search Property

</h3>


<div class="row">


<div class="col-md-4">

<label>

Floor

</label>

<select id="floorSelect" class="form-select">

<option>Select Floor</option>

</select>

</div>



<div class="col-md-4">

<label>

Area

</label>

<select id="areaSelect" class="form-select">

<option>Select Area</option>

</select>

</div>



<div class="col-md-4">

<label>

Search Area

</label>

<select id="areaSearch" class="form-select">

<option>All Areas</option>

<option>45 SQM</option>
<option>78 SQM</option>
<option>90 SQM</option>
<option>95 SQM</option>
<option>115 SQM</option>
<option>150 SQM</option>
<option>190 SQM</option>
<option>200 SQM</option>


</select>

</div>


</div>


</div>






<!-- DETAILS -->


<div class="card shadow p-4 mt-4">


<div class="row">


<div class="col-lg-6">


<img id="unitImage"

class="img-fluid rounded">


<div id="gallery"

class="d-flex gap-2 mt-3">

</div>


</div>





<div class="col-lg-6">


<h2 id="unitName">

Select Unit

</h2>



<hr>



<p>

<b>Area:</b>

<span id="area"></span>

</p>



<p>

<b>Price:</b>

<span id="price"></span>

</p>



<p>

<b>Status:</b>

<span id="status"></span>

</p>



<p>

<b>Payment:</b>

<span id="payment"></span>

</p>



<button class="btn btn-success mt-3">

⭐ Add To Compare

</button>



<button class="btn btn-primary mt-3">

BOOK NOW

</button>


</div>


</div>


</div>







<!-- COMPARE -->


<div class="card shadow p-4 mt-4">


<h3>

⚖ Compare Units

</h3>


<div id="compareBox">

No Units Selected

</div>


</div>








<!-- CALCULATOR -->


<div class="card shadow p-4 mt-4">


<h3>

💰 Payment Calculator

</h3>



<div class="row">


<div class="col-md-4">

<input id="downPayment"

class="form-control"

placeholder="Down Payment">


</div>


<div class="col-md-4">


<select id="years"

class="form-select">

<option>6</option>

<option>8</option>

<option>10</option>

<option>11</option>

<option>12.5</option>

</select>


</div>



<div class="col-md-4">


<select id="paymentType"

class="form-select">


<option value="12">

Monthly

</option>


<option value="4">

Quarterly

</option>


<option value="1">

Yearly

</option>


</select>


</div>


</div>


<button id="calculateBtn"

class="btn btn-dark w-100 mt-3">

Calculate

</button>


<h3 id="result"

class="mt-4">

</h3>


</div>







<!-- PROJECT INFO -->


<div class="card shadow p-4 mt-4">


<h3>

📍 Locations & Amenities

</h3>


<p>

Company Location:

<span id="companyLocation"></span>

</p>


<p>

Project Location:

<span id="projectLocation"></span>

</p>



<h5>

Nearby:

</h5>


<ul id="landmarks"></ul>



<h5>

Inside Compound:

</h5>


<ul id="amenities"></ul>


</div>







</div>


<script src="script.js"></script>


</body>

</html>
