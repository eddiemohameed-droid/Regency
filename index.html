<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regency Unit Finder</title>

<style>
body{
    font-family:Arial;
    background:#f3f3f3;
    margin:0;
}

.container{
    width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#003B73;
}

select{
    width:100%;
    padding:12px;
    margin:20px 0;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
}

.available{
    color:green;
    font-weight:bold;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:20px;
}

</style>

</head>


<body>

<div class="container">

<h1>Regency Unit Finder</h1>


<select id="unitSelect">
<option>Select Unit</option>
</select>


<div class="card">

<h2 id="unitName">Select a Unit</h2>

<p><b>Area:</b> <span id="area"></span></p>

<p><b>Price:</b> <span id="price"></span></p>

<p><b>Payment Plan:</b> <span id="payment"></span></p>

<p id="status"></p>

<img id="unitImage">


</div>

</div>


<script>

fetch("units.json")

.then(response => response.json())

.then(units => {


let dropdown = document.getElementById("unitSelect");


// Add units to dropdown

units.forEach(unit => {

let option = document.createElement("option");

option.value = unit.unit;

option.textContent = unit.unit;

dropdown.appendChild(option);

});



// When selecting unit

dropdown.addEventListener("change", function(){


let selectedUnit = units.find(
u => u.unit === this.value
);


if(selectedUnit){


document.getElementById("unitName").innerHTML =
"Unit " + selectedUnit.unit;


document.getElementById("area").innerHTML =
selectedUnit.area;


document.getElementById("price").innerHTML =
selectedUnit.price || "Not Available";


document.getElementById("payment").innerHTML =
selectedUnit.payment;


document.getElementById("status").innerHTML =
selectedUnit.status;


document.getElementById("unitImage").src =
selectedUnit.image;


}


});


})

.catch(error => console.log(error));


</script>


</body>
</html>
